name: TFLOPS Multi-Platform Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-api:
    name: Build Go API (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build API
        working-directory: ./api
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ../tflops-api .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflops-api-linux
          path: tflops-api

  build-plugin:
    name: Build Rust Plugin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install cross (for Linux/Windows)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross
        
      - name: Build Plugin (Cross)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./plugin
        run: cross build --release --target ${{ matrix.target }}
        
      - name: Build Plugin (MacOS)
        if: matrix.os == 'macos-latest'
        working-directory: ./plugin
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Locate and Rename
        id: locate
        run: |
          TARGET_DIR="target/${{ matrix.target }}/release"
          BINARY_NAME="tflops"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY_NAME="tflops.exe"
          fi
          cp "$TARGET_DIR/$BINARY_NAME" "tflops-${{ matrix.target }}"
          echo "path=tflops-${{ matrix.target }}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflops-plugin-${{ matrix.target }}
          path: tflops-${{ matrix.target }}

  build-website:
    name: Build Next.js website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './website/package-lock.json'
      - name: Install dependencies
        working-directory: ./website
        run: npm ci
      - name: Build website
        working-directory: ./website
        run: npm run build

